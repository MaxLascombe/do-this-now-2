name: EAS Update

# Ship JS/asset changes to the installed app over-the-air on every push to main.
# Only fires when something the mobile bundle contains changes — mobile itself,
# the shared package it imports, or the lockfile. Web/server-only pushes don't
# republish.
#
# Native safety: runtimeVersion is a fixed string in app.json, shared by the
# build and every update — so updates always reach the installed build. The
# tradeoff is manual: when you change a native input (deps, plugins, native
# config), bump that string in app.json and rebuild, or an update could land on
# an incompatible build. (The "fingerprint" policy automated this but wasn't
# reproducible between EAS's build image and eas-cli, so updates never matched.)
on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/eas-update.yml"

# One publish at a time; newer pushes supersede in-flight ones.
concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # Hoisted layout: babel.config.js resolves babel-preset-expo and its
        # transitive plugins from mobile/node_modules. mobile/.npmrc sets this
        # only when pnpm runs from mobile/; this job installs from the repo
        # root, so pass it here. Scoped to this step — web/Vercel installs are
        # untouched.
        env:
          npm_config_node_linker: hoisted
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile
        run: pnpm --filter mobile typecheck

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          # Install the global eas-cli with npm, not pnpm: pnpm exits non-zero
          # on eas-cli's ignored build scripts. Only affects the CLI install;
          # project deps still use pnpm above.
          packager: npm

      - name: Publish update
        working-directory: mobile
        # Message via env (not inlined) so commit text can't break the shell.
        # Branch "preview" is the channel the internally-distributed build
        # subscribes to. `--environment production` loads the EXPO_PUBLIC_* vars
        # from the EAS "production" environment and inlines them into the bundle
        # (the same env our eas.json build profiles use) — without them the OTA
        # would ship a build with an undefined Clerk key and refuse to start.
        # `--platform ios`: the only target we build; the default (all) also
        # exports web, which this native app has no react-native-web for.
        env:
          UPDATE_MESSAGE: ${{ github.event.head_commit.message }}
        run: eas update --branch preview --environment production --platform ios --message "$UPDATE_MESSAGE" --non-interactive
